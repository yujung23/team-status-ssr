<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>팀원 상태 수정</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #f0f7ff;
            --sky-blue: #cce0ff;
            --text-main: #333333;
            --border-color: #e1e8f0;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--light-blue);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.08);
        }

        h2 {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--sky-blue);
            padding-bottom: 12px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        /* 수정 불가능한 이름 필드 전용 디자인 */
        .name-display {
            font-size: 15px;
            font-weight: 600;
            padding: 12px;
            background-color: #f8fbff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--primary-blue);
            margin: 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-submit { background-color: var(--primary-blue); color: white; }
        .btn-submit:hover { background-color: #004494; box-shadow: 0 2px 6px rgba(0,86,179,0.3); }

        .btn-cancel { background-color: #e2e8f0; color: #333; }
        .btn-cancel:hover { background-color: #cbd5e1; }
    </style>
</head>
<body>
<div class="container">
    <h2>✏️ 상태 수정</h2>

    <form th:action="@{/edit}" th:object="${formDto}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>이름</label>
            <p class="name-display" th:text="${member.name}"></p>
        </div>

        <div class="form-group">
            <label for="status">현재 상태</label>
            <select th:field="*{status}">
                <option th:each="s : ${statuses}"
                        th:value="${s.name()}"
                        th:text="${s.description}">상태</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">메시지</label>
            <input type="text" th:field="*{message}" placeholder="새로운 메시지를 입력하세요" />
        </div>

        <div class="button-group">
            <a th:href="@{/dashboard}" class="btn btn-cancel">취소</a>
            <button type="submit" class="btn btn-submit">수정 완료</button>
        </div>
    </form>
</div>
</body>
</html>
