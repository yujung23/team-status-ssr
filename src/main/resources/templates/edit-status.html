<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>팀원 상태 수정</title>
</head>
<body>
<h2>상태 수정</h2>

<form th:action="@{/edit}" th:object="${formDto}" method="post">
    <input type="hidden" th:field="*{id}" />

    <p>팀원 이름: <strong th:text="${member.name}"></strong></p>

    <div>
        <label for="status">현재 상태:</label>
        <select th:field="*{status}">
            <option th:each="s : ${statuses}"
                    th:value="${s.name()}"
                    th:text="${s.description}">상태</option>
        </select>
    </div>
    <br>

    <div>
        <label for="message">메시지:</label>
        <input type="text" th:field="*{message}" />
    </div>
    <br>

    <button type="submit">수정 완료</button>
</form>
</body>
</html>
