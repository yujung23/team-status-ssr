<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 팀원 등록</title>
    <style>
        /* 컬러 팔레트 */
        :root {
            --primary-blue: #0056b3;
            --light-blue: #f0f7ff;
            --sky-blue: #cce0ff;
            --text-main: #333333;
            --border-color: #e1e8f0;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--light-blue);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* 폼에 맞게 너비를 500px로 줄인 컨테이너 */
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.08);
        }

        h2 {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--sky-blue);
            padding-bottom: 12px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
            text-align: center;
        }

        /* 폼 요소 스타일링 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        /* 버튼 그룹 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-submit {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-submit:hover {
            background-color: #004494;
            box-shadow: 0 2px 6px rgba(0,86,179,0.3);
        }

        .btn-cancel {
            background-color: #e2e8f0;
            color: #333;
        }

        .btn-cancel:hover {
            background-color: #cbd5e1;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>➕ 신규 팀원 상태 등록</h2>

    <form th:action="@{/add}" th:object="${formDto}" method="post">
        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" th:field="*{name}" placeholder="팀원의 이름을 입력하세요" required />
        </div>

        <div class="form-group">
            <label for="status">현재 상태</label>
            <select th:field="*{status}">
                <option th:each="s : ${statuses}"
                        th:value="${s.name()}"
                        th:text="${s.description}">상태 선택</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">메시지</label>
            <input type="text" th:field="*{message}" placeholder="오늘의 한마디를 적어주세요 (선택)" />
        </div>

        <div class="button-group">
            <a th:href="@{/dashboard}" class="btn btn-cancel">취소</a>
            <button type="submit" class="btn btn-submit">등록하기</button>
        </div>
    </form>
</div>
</body>
</html>
